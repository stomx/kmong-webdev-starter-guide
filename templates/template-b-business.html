<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기업 소개형 홈페이지 템플릿</title>
  <link rel="stylesheet" href="./template-common.css" />
</head>
<body>
  <header class="hero">
    <div class="section">
      <span class="badge">Template B · Business</span>
      <h1>신뢰를 설계하는 기업형 홈페이지</h1>
      <p>브랜드 이야기, 서비스, 업무 프로세스, 문의를 한 번에 정리해 제안형으로 전환 가능한 구조입니다.</p>
      <a class="btn" href="#contact">상세 상담 받기</a>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">회사 소개</h2>
    <div class="grid">
      <div class="card">
        <h3>ABOUT</h3>
        <p>비즈니스의 핵심 가치를 한 장으로 전달합니다.</p>
      </div>
      <div class="card">
        <h3>SERVICES</h3>
        <p>기획·디자인·개발·운영을 분리하여 가독성 있게 구성합니다.</p>
      </div>
      <div class="card">
        <h3>RESULTS</h3>
        <p>기존 사례와 성과 포인트를 한눈에 확인할 수 있게 정렬합니다.</p>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">문의</h2>
    <form id="contact">
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="name@company.com" />
      <label for="need">요구사항</label>
      <textarea id="need" rows="6" placeholder="페이지 수, 기능, 일정, 예산 범위를 입력하세요."></textarea>
      <button class="btn" type="button">요청서 전송</button>
    </form>
  </section>

  <footer>
    <div class="section">© Template B | 기업 소개형</div>
  </footer>
</body>
</html>
